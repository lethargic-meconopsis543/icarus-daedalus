<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Icarus / Daedalus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #101014;
    --surface: #18181c;
    --surface-2: #1e1e24;
    --border: #2a2a30;
    --text: #c8c8d0;
    --text-dim: #6e6e78;
    --text-bright: #e8e8f0;
    --accent-a: #c87040;
    --accent-b: #5080a8;
    --accent-a-dim: rgba(200,112,64,0.12);
    --accent-b-dim: rgba(80,128,168,0.12);
    --green: #48a868;
    --green-dim: rgba(72,168,104,0.15);
    --red: #c85050;
    --red-dim: rgba(200,80,80,0.15);
    --yellow: #c8a040;
    --yellow-dim: rgba(200,160,64,0.15);
    --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  }

  html { font-size: 14px; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

  header { padding: 24px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--text-bright); letter-spacing: -0.02em; }
  header .subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  header .live { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-left: auto; }
  header .live::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 6px; vertical-align: middle; }

  .stats { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; background: var(--surface); padding: 16px 24px; }
  .stat-label { font-size: 11px; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text-bright); }
  .stat-detail { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 10px 20px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text-bright); border-bottom-color: var(--text-bright); }

  .panels { display: none; }
  .panels.active { display: flex; min-height: calc(100vh - 180px); }
  .panel-single.active { display: block; min-height: calc(100vh - 180px); overflow-y: auto; }

  .panel { flex: 1; overflow-y: auto; max-height: calc(100vh - 180px); }
  .panel + .panel { border-left: 1px solid var(--border); }

  .panel-header { position: sticky; top: 0; background: var(--surface); padding: 12px 20px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; font-weight: 500; z-index: 1; }
  .panel-header.agent-a { color: var(--accent-a); }
  .panel-header.agent-b { color: var(--accent-b); }

  .cycle { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .cycle:last-child { border-bottom: none; }
  .cycle-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cycle-num { font-family: var(--mono); font-size: 11px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.04em; }
  .cycle-ts { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

  .cycle-field { margin-bottom: 8px; }
  .cycle-field:last-child { margin-bottom: 0; }
  .field-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .agent-a .field-label { color: var(--accent-a); }
  .agent-b .field-label { color: var(--accent-b); }
  .field-body { color: var(--text); line-height: 1.65; }

  .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; font-family: var(--mono); font-size: 12px; line-height: 1.5; overflow-x: auto; white-space: pre; color: var(--text); margin: 6px 0; }

  .severity { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 3px; margin-right: 6px; }
  .severity-must { background: var(--red-dim); color: var(--red); }
  .severity-should { background: var(--yellow-dim); color: var(--yellow); }
  .severity-nit { background: rgba(100,100,120,0.15); color: #808090; }

  .memory-content { padding: 20px; font-family: var(--mono); font-size: 12px; line-height: 1.6; white-space: pre-wrap; color: var(--text); max-width: 900px; }
  .memory-bar { margin: 20px; max-width: 400px; }
  .memory-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .memory-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .memory-bar-fill.a { background: var(--accent-a); }
  .memory-bar-fill.b { background: var(--accent-b); }
  .memory-bar-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; display: flex; justify-content: space-between; }

  .world-link { display: block; padding: 12px 20px; border-bottom: 1px solid var(--border); color: var(--accent-b); text-decoration: none; font-family: var(--mono); font-size: 13px; transition: background 0.1s; }
  .world-link:hover { background: var(--accent-b-dim); }

  .empty-state { padding: 40px 20px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 12px; }

  /* ── Platform / Agent cards ──────────── */
  .agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .agent-card { background: var(--surface); padding: 24px; }
  .agent-card-name { font-family: var(--mono); font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .agent-card-name.a { color: var(--accent-a); }
  .agent-card-name.b { color: var(--accent-b); }

  .agent-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .agent-row:last-child { border-bottom: none; }
  .agent-row-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
  .agent-row-value { font-family: var(--mono); font-size: 12px; color: var(--text); }

  .badge { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.03em; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .badge-dim { background: rgba(100,100,120,0.12); color: var(--text-dim); }

  .soul-preview { font-family: var(--mono); font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 12px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; white-space: pre-wrap; word-break: break-word; }

  /* ── Guide section ───────────────────── */
  .guide { padding: 24px 32px; max-width: 800px; }
  .guide h2 { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text-bright); margin: 24px 0 12px; }
  .guide h2:first-child { margin-top: 0; }
  .guide p { color: var(--text); line-height: 1.7; margin-bottom: 10px; }
  .guide code { font-family: var(--mono); font-size: 12px; background: var(--surface-2); padding: 2px 6px; border-radius: 3px; color: var(--text-bright); }
  .guide pre { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 14px; font-family: var(--mono); font-size: 12px; line-height: 1.5; overflow-x: auto; color: var(--text); margin: 8px 0 16px; }
  .guide .step { counter-increment: step; padding-left: 28px; position: relative; margin-bottom: 16px; }
  .guide .step::before { content: counter(step); position: absolute; left: 0; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-dim); background: var(--surface-2); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; top: 2px; }
  .guide .steps { counter-reset: step; }

  @media (max-width: 768px) {
    .panels.active { flex-direction: column; }
    .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
    .panel { max-height: none; }
    .agent-grid { grid-template-columns: 1fr; }
    header { padding: 16px; flex-wrap: wrap; }
    .stat { padding: 12px 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>Icarus / Daedalus</h1>
  <span class="subtitle">two agents. persistent memory. every platform.</span>
  <span class="live" id="live">connected</span>
</header>

<div class="stats" id="stats"></div>
<div class="tabs" id="tabs"></div>

<div class="panels active" id="panel-dialogue">
  <div class="panel" id="icarus-dialogue"></div>
  <div class="panel" id="daedalus-dialogue"></div>
</div>

<div class="panels" id="panel-code">
  <div class="panel" id="icarus-code"></div>
  <div class="panel" id="daedalus-code"></div>
</div>

<div class="panels panel-single" id="panel-platforms">
  <div id="platforms-content"></div>
</div>

<div class="panels panel-single" id="panel-memory">
  <div id="memory-content"></div>
</div>

<div class="panels panel-single" id="panel-worlds">
  <div id="worlds-content"></div>
</div>

<div class="panels panel-single" id="panel-guide">
  <div id="guide-content"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function switchTab(panel) {
  $$(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector('.tab[data-panel="' + panel + '"]').classList.add("active");
  $$(".panels").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + panel).classList.add("active");
}

let currentTab = null;

function renderTabs(data) {
  const tabs = [];
  if (data.totals.dialogueCycles > 0) tabs.push({ id: "dialogue", label: "dialogue" });
  if (data.totals.codeCycles > 0) tabs.push({ id: "code", label: "code review" });
  tabs.push({ id: "platforms", label: "platforms" });
  tabs.push({ id: "memory", label: "memory" });
  if (data.worlds.length > 0) tabs.push({ id: "worlds", label: "worlds" });
  tabs.push({ id: "guide", label: "guide" });

  if (!currentTab || !tabs.find(t => t.id === currentTab)) currentTab = tabs[0].id;

  $("#tabs").innerHTML = tabs
    .map(t => '<div class="tab ' + (t.id === currentTab ? "active" : "") + '" data-panel="' + t.id + '">' + t.label + '</div>')
    .join("");

  $$(".tab").forEach(tab => {
    tab.addEventListener("click", () => { currentTab = tab.dataset.panel; switchTab(currentTab); });
  });

  $$(".panels").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + currentTab).classList.add("active");
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function renderStats(data) {
  const t = data.totals;
  const memPct = Math.round((t.memoryBytes / 4400) * 100);
  const allCycles = [...data.dialogue.icarus, ...data.codeReview.icarus];
  const last = allCycles.length > 0 ? allCycles[allCycles.length - 1] : null;

  const ia = data.agents.icarus;
  const da = data.agents.daedalus;
  const gwUp = (ia.gateway === "running" ? 1 : 0) + (da.gateway === "running" ? 1 : 0);
  const platCount = [ia.platforms.telegram, ia.platforms.slack, da.platforms.telegram, da.platforms.slack]
    .filter(s => s !== "not configured").length;

  let s = '';
  s += '<div class="stat"><div class="stat-label">cycles</div><div class="stat-value">' + (t.dialogueCycles + t.codeCycles) + '</div><div class="stat-detail">last: ' + (last ? last.timestamp : "none") + '</div></div>';
  s += '<div class="stat"><div class="stat-label">messages</div><div class="stat-value">' + t.totalMessages + '</div></div>';
  s += '<div class="stat"><div class="stat-label">gateways</div><div class="stat-value">' + gwUp + '/2</div><div class="stat-detail">' + (gwUp === 2 ? "both running" : gwUp === 1 ? "1 stopped" : "both stopped") + '</div></div>';
  s += '<div class="stat"><div class="stat-label">platforms</div><div class="stat-value">' + platCount + '</div><div class="stat-detail">configured</div></div>';
  s += '<div class="stat"><div class="stat-label">memory</div><div class="stat-value">' + memPct + '%</div><div class="stat-detail">' + t.memoryBytes + ' / 4400 bytes</div></div>';
  $("#stats").innerHTML = s;
}

function badge(state) {
  if (state === "connected" || state === "running") return '<span class="badge badge-green">' + state + '</span>';
  if (state === "configured") return '<span class="badge badge-yellow">' + state + '</span>';
  if (state === "stopped") return '<span class="badge badge-red">' + state + '</span>';
  return '<span class="badge badge-dim">' + state + '</span>';
}

function renderPlatforms(data) {
  const ia = data.agents.icarus;
  const da = data.agents.daedalus;

  function card(a, cls) {
    return '<div class="agent-card">'
      + '<div class="agent-card-name ' + cls + '">' + a.name + '</div>'
      + '<div class="agent-row"><span class="agent-row-label">gateway</span>' + badge(a.gateway) + '</div>'
      + '<div class="agent-row"><span class="agent-row-label">telegram</span>' + badge(a.platforms.telegram) + '</div>'
      + '<div class="agent-row"><span class="agent-row-label">slack</span>' + badge(a.platforms.slack) + '</div>'
      + '<div class="agent-row"><span class="agent-row-label">model</span><span class="agent-row-value">' + esc(a.model) + '</span></div>'
      + '<div class="agent-row"><span class="agent-row-label">memory</span><span class="agent-row-value">' + a.memoryBytes + ' / 2200 bytes</span></div>'
      + '<div class="soul-preview">' + esc(a.soul) + '</div>'
      + '</div>';
  }

  $("#platforms-content").innerHTML = '<div class="agent-grid">' + card(ia, "a") + card(da, "b") + '</div>';
}

function renderGuide() {
  $("#guide-content").innerHTML = '<div class="guide">'
    + '<h2>quick start</h2>'
    + '<pre>git clone https://github.com/esaradev/icarus-daedalus.git\\ncd icarus-daedalus\\nbash setup.sh</pre>'
    + '<p>The setup wizard handles hermes installation, template selection, platform configuration, and runs a test cycle.</p>'

    + '<h2>run a dialogue cycle</h2>'
    + '<pre># creative / philosophical dialogue\\nbash dialogue.sh\\n\\n# code review (pass a task)\\nbash templates/code-review/dialogue.sh "write a rate limiter"\\n\\n# research\\nbash templates/research-validation/dialogue.sh "effect of sleep on memory"\\n\\n# trading\\nbash templates/trading-strategy/dialogue.sh "BTC at 65k, ETH ratio low"</pre>'

    + '<h2>manage gateways</h2>'
    + '<pre># start both\\nHERMES_HOME=~/.hermes-icarus hermes gateway run &amp;\\nHERMES_HOME=~/.hermes-daedalus hermes gateway run &amp;\\n\\n# stop both\\npkill -f "hermes gateway run"\\n\\n# check status\\nps aux | grep "hermes gateway"</pre>'

    + '<h2>cross-platform memory</h2>'
    + '<p>Both dialogue scripts write session summaries to <code>~/.hermes-{agent}/memories/MEMORY.md</code>. Hermes injects this into the system prompt at session start. Work done on Slack is recallable on Telegram and vice versa.</p>'
    + '<p>After writing new memory, restart gateways for agents to pick it up. Memory auto-trims at 2200 chars, rotating out the oldest entries.</p>'

    + '<h2>swap the SOUL files</h2>'
    + '<p>Agents are defined by their SOUL files. Change what the agents do by editing:</p>'
    + '<pre>~/.hermes-icarus/SOUL.md\\n~/.hermes-daedalus/SOUL.md</pre>'
    + '<p>Or pick a template during <code>bash setup.sh</code>: code review, research, trading, creative, or write your own.</p>'

    + '<h2>templates</h2>'
    + '<div class="steps">'
    + '<div class="step"><p><strong>code-review</strong> -- Icarus writes code, Daedalus reviews with MUST FIX / SHOULD FIX / NIT labels. Pass a file or task description as argument.</p></div>'
    + '<div class="step"><p><strong>research-validation</strong> -- Explorer finds insights, Validator fact-checks. Pass a research topic as argument.</p></div>'
    + '<div class="step"><p><strong>trading-strategy</strong> -- Strategist proposes setups, Risk Manager stress-tests. Pass market context as argument.</p></div>'
    + '<div class="step"><p><strong>creative</strong> -- the original Icarus/Daedalus philosophical dialogue. Runs automatically, no argument needed.</p></div>'
    + '<div class="step"><p><strong>custom</strong> -- describe your agents during setup and it generates SOUL files for you.</p></div>'
    + '</div>'

    + '<h2>automate</h2>'
    + '<pre># run every 3 hours\\ncrontab -e\\n# add: 0 */3 * * * cd ~/icarus-daedalus &amp;&amp; bash dialogue.sh >> cron.log 2>&amp;1</pre>'

    + '<h2>dashboard</h2>'
    + '<pre>node dashboard.js\\n# open http://localhost:3000</pre>'
    + '<p>This page. Updates in real time when log files change. Run a dialogue cycle in another terminal and watch it appear.</p>'

    + '<h2>reset sessions</h2>'
    + '<p>If agents have stale context on Telegram, nuke sessions and restart:</p>'
    + '<pre>rm -f ~/.hermes-icarus/sessions/* ~/.hermes-icarus/state.db\\nrm -f ~/.hermes-daedalus/sessions/* ~/.hermes-daedalus/state.db\\npkill -f "hermes gateway run"\\nHERMES_HOME=~/.hermes-icarus hermes gateway run &amp;\\nHERMES_HOME=~/.hermes-daedalus hermes gateway run &amp;</pre>'
    + '</div>';
}

function renderDialogueCycle(c, agent) {
  const cls = agent === "icarus" ? "agent-a" : "agent-b";
  let f = "";
  if (c.thought) f += '<div class="cycle-field"><div class="field-label">thought</div><div class="field-body">' + esc(c.thought) + '</div></div>';
  if (c.question) f += '<div class="cycle-field"><div class="field-label">question</div><div class="field-body">' + esc(c.question) + '</div></div>';
  if (c.response) f += '<div class="cycle-field"><div class="field-label">response</div><div class="field-body">' + esc(c.response) + '</div></div>';
  if (c.challenge) f += '<div class="cycle-field"><div class="field-label">challenge</div><div class="field-body">' + esc(c.challenge) + '</div></div>';
  return '<div class="cycle ' + cls + '"><div class="cycle-header"><span class="cycle-num">CYCLE ' + c.cycle + '</span><span class="cycle-ts">' + (c.timestamp || "") + '</span></div>' + f + '</div>';
}

function renderCodeCycle(c, agent) {
  const cls = agent === "icarus" ? "agent-a" : "agent-b";
  let body = "";
  if (c.code) {
    for (const block of c.code) {
      const clean = block.replace(/^```\\w*\\n?/, "").replace(/\\n?```$/, "");
      body += '<div class="code-block">' + esc(clean) + '</div>';
    }
  }
  if (c.reviews) {
    for (const r of c.reviews) {
      const sev = r.match(/^(MUST FIX|SHOULD FIX|NIT)/i);
      const sc = sev ? "severity-" + sev[1].split(" ")[0].toLowerCase() : "";
      const sl = sev ? sev[1] : "";
      body += '<div class="cycle-field"><span class="severity ' + sc + '">' + sl + '</span><span class="field-body">' + esc(r.replace(/^(MUST FIX|SHOULD FIX|NIT)[:\\s]*/i, "").trim()) + '</span></div>';
    }
  }
  if (!c.code && !c.reviews) {
    const raw = c.raw.replace(/## Cycle \\d+/, "").replace(/\\d{4}-\\d{2}-\\d{2}.*UTC/, "").trim();
    if (raw.includes("```")) {
      const blocks = raw.match(/```[\\s\\S]*?```/g) || [];
      const text = raw.replace(/```[\\s\\S]*?```/g, "").trim();
      if (text) body += '<div class="field-body">' + esc(text) + '</div>';
      for (const block of blocks) {
        const clean = block.replace(/^```\\w*\\n?/, "").replace(/\\n?```$/, "");
        body += '<div class="code-block">' + esc(clean) + '</div>';
      }
    } else {
      body += '<div class="field-body">' + esc(raw) + '</div>';
    }
  }
  return '<div class="cycle ' + cls + '"><div class="cycle-header"><span class="cycle-num">CYCLE ' + c.cycle + '</span><span class="cycle-ts">' + (c.timestamp || "") + '</span></div>' + body + '</div>';
}

function renderPanel(cycles, container, agent, renderFn) {
  const cls = agent === "icarus" ? "agent-a" : "agent-b";
  const reversed = [...cycles].reverse();
  container.innerHTML = '<div class="panel-header ' + cls + '">' + agent + '</div>'
    + (reversed.length === 0 ? '<div class="empty-state">no cycles yet</div>' : reversed.map(c => renderFn(c, agent)).join(""));
}

function renderMemory(data) {
  const limit = 2200;
  const ib = data.memory.icarus.bytes;
  const db = data.memory.daedalus.bytes;
  let h = '';
  h += '<div class="memory-bar"><div class="memory-bar-label"><span>icarus</span><span>' + ib + ' / ' + limit + '</span></div><div class="memory-bar-track"><div class="memory-bar-fill a" style="width:' + Math.min(100, (ib/limit)*100) + '%"></div></div></div>';
  h += '<div class="memory-bar"><div class="memory-bar-label"><span>daedalus</span><span>' + db + ' / ' + limit + '</span></div><div class="memory-bar-track"><div class="memory-bar-fill b" style="width:' + Math.min(100, (db/limit)*100) + '%"></div></div></div>';
  h += '<div class="memory-content">' + esc(data.memory.icarus.content || "(empty)") + '</div>';
  $("#memory-content").innerHTML = h;
}

function renderWorlds(data) {
  if (data.worlds.length === 0) { $("#worlds-content").innerHTML = '<div class="empty-state">no worlds generated yet</div>'; return; }
  $("#worlds-content").innerHTML = data.worlds.map(u => '<a class="world-link" href="' + esc(u) + '" target="_blank" rel="noopener">' + esc(u) + '</a>').join("");
}

function render(data) {
  renderTabs(data);
  renderStats(data);
  renderPanel(data.dialogue.icarus, $("#icarus-dialogue"), "icarus", renderDialogueCycle);
  renderPanel(data.dialogue.daedalus, $("#daedalus-dialogue"), "daedalus", renderDialogueCycle);
  renderPanel(data.codeReview.icarus, $("#icarus-code"), "icarus", renderCodeCycle);
  renderPanel(data.codeReview.daedalus, $("#daedalus-code"), "daedalus", renderCodeCycle);
  renderPlatforms(data);
  renderMemory(data);
  renderWorlds(data);
  renderGuide();
}

fetch("/api/stats").then(r => r.json()).then(render);

const sse = new EventSource("/api/stream");
sse.onmessage = e => render(JSON.parse(e.data));
sse.onerror = () => { $("#live").textContent = "reconnecting"; $("#live").style.opacity = "0.5"; };
sse.onopen = () => { $("#live").textContent = "connected"; $("#live").style.opacity = "1"; };
</script>
</body>
</html>
