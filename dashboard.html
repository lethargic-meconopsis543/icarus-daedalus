<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920">
<title>icarus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@font-face{font-family:'BT';src:local('Menlo'),local('Consolas'),local('Monaco');font-display:swap}
:root{--bg:#0a0a0a;--panel:#0f0f0f;--bdr:#1a1a1a;--t0:#f0f0f0;--t1:#b0b0b0;--t2:#606060;--t3:#383838;--hi:#ff8c00;--up:#00c853;--dn:#ff1744;--bl:#448aff;--yl:#ffd600}
body{font-family:'BT',monospace;background:var(--bg);color:var(--t1);width:1920px;height:1080px;overflow:hidden;font-size:11px;line-height:1;-webkit-font-smoothing:none}

/* grid: bloomberg-style tiled panels, no gaps, all borders */
.G{display:grid;width:100%;height:100%;grid-template-columns:480px 480px 480px 480px;grid-template-rows:28px 180px 180px 1fr 28px;grid-template-areas:
  "hd hd hd hd"
  "ag ag tm tm"
  "fd fd me me"
  "fd fd rt rt"
  "ft ft ft ft"}

.P{background:var(--panel);border:1px solid var(--bdr);overflow:hidden;display:flex;flex-direction:column}
.P-hd{background:var(--bdr);color:var(--t2);font-size:10px;padding:2px 6px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.P-hd .tag{color:var(--hi)}
.P-body{flex:1;overflow-y:auto;overflow-x:hidden}
.P-body::-webkit-scrollbar{width:2px}
.P-body::-webkit-scrollbar-thumb{background:var(--t3)}

/* header bar */
.HD{grid-area:hd;background:var(--bdr);display:flex;align-items:center;padding:0 8px;gap:16px;border-bottom:1px solid var(--t3)}
.HD .logo{color:var(--hi);font-size:12px;font-weight:bold;letter-spacing:2px}
.HD .sep{color:var(--t3)}
.HD .kv{color:var(--t2)}
.HD .kv b{color:var(--t1);font-weight:normal}
.HD .live{color:var(--up)}
.HD .r{margin-left:auto;display:flex;gap:12px}

/* footer */
.FT{grid-area:ft;background:var(--bdr);display:flex;align-items:center;padding:0 8px;gap:8px;border-top:1px solid var(--t3)}
.FT .cmd{color:var(--t2);cursor:pointer}
.FT .cmd:hover{color:var(--hi)}
.FT .sep{color:var(--t3)}

/* agents panel */
.AG{grid-area:ag}
.ag-row{display:flex;padding:2px 6px;border-bottom:1px solid #131313}
.ag-row:hover{background:#141414}
.ag-name{width:90px;color:var(--t0);overflow:hidden;text-overflow:ellipsis}
.ag-stat{width:50px;text-align:center}
.ag-role{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ag-plat{width:70px;text-align:right;color:var(--t2)}
.ag-ts{width:50px;text-align:right;color:var(--t3)}

/* timeline chart */
.TM{grid-area:tm}
canvas{width:100%;height:100%}

/* feed */
.FD{grid-area:fd}
.fd-row{padding:3px 6px;border-bottom:1px solid #131313}
.fd-ts{color:var(--t3);display:inline}
.fd-agent{display:inline}
.fd-cyc{color:var(--t3);display:inline}
.fd-text{color:var(--t1);margin-top:1px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* memory entries */
.ME{grid-area:me}
.me-row{display:flex;padding:2px 6px;border-bottom:1px solid #131313;gap:4px}
.me-tier{width:32px}
.me-type{width:60px;color:var(--t2)}
.me-agent{width:70px}
.me-body{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-ts{width:36px;text-align:right;color:var(--t3)}

/* right panel: tiers + platforms + compaction */
.RT{grid-area:rt}
.rt-section{padding:2px 6px;border-bottom:1px solid var(--bdr)}
.rt-section-hd{color:var(--t3);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 0}
.tier-row{display:flex;align-items:center;gap:4px;padding:1px 0}
.tier-k{width:32px;text-align:right}
.tier-bar{flex:1;height:4px;background:var(--t3)}
.tier-fill{height:100%}
.tier-n{width:24px;text-align:right;color:var(--t2)}
.plat-row{display:flex;gap:4px;padding:1px 0}
.plat-dot{width:6px;height:6px;border-radius:50%;margin-top:2px}
.plat-name{width:70px}
.plat-badge{width:60px;color:var(--t2)}
.plat-state{flex:1;text-align:right}
.cmp-row{padding:1px 0;color:var(--t2)}
.cmp-ts{color:var(--t3)}

/* stat number colors */
.up{color:var(--up)}.dn{color:var(--dn)}.hi{color:var(--hi)}.bl{color:var(--bl)}.yl{color:var(--yl)}
</style>
</head>
<body>
<div class="G">

<div class="HD">
  <span class="logo">ICARUS</span>
  <span class="sep">|</span>
  <span class="kv">AGENTS <b id="h-agents">--</b></span>
  <span class="sep">|</span>
  <span class="kv">CYCLES <b id="h-cycles">--</b></span>
  <span class="sep">|</span>
  <span class="kv">ENTRIES <b id="h-entries">--</b></span>
  <span class="sep">|</span>
  <span class="kv">BRAIN <b id="h-brain">--</b></span>
  <span class="sep">|</span>
  <span class="kv">HOT <b class="hi" id="h-hot">--</b> WARM <b class="yl" id="h-warm">--</b> COLD <b class="bl" id="h-cold">--</b></span>
  <div class="r">
    <span class="kv">LAST <b id="h-last">--</b></span>
    <span class="sep">|</span>
    <span class="live" id="h-live">LIVE</span>
  </div>
</div>

<div class="P AG">
  <div class="P-hd">agents <span class="tag" id="ag-count"></span></div>
  <div class="P-body">
    <div class="ag-row" style="color:var(--t3)">
      <div class="ag-name">NAME</div><div class="ag-stat">STAT</div><div class="ag-role">ROLE</div><div class="ag-plat">PLAT</div><div class="ag-ts">LAST</div>
    </div>
    <div id="al"></div>
  </div>
</div>

<div class="P TM">
  <div class="P-hd">entry timeline <span class="tag" id="tm-days"></span></div>
  <div class="P-body"><canvas id="cv"></canvas></div>
</div>

<div class="P FD">
  <div class="P-hd">activity feed <span class="tag" id="fd-count"></span></div>
  <div class="P-body" id="fd"></div>
</div>

<div class="P ME">
  <div class="P-hd">fabric entries <span class="tag" id="me-count"></span></div>
  <div class="P-body">
    <div class="me-row" style="color:var(--t3)">
      <div class="me-tier">TIER</div><div class="me-type">TYPE</div><div class="me-agent">AGENT</div><div class="me-body">CONTENT</div><div class="me-ts">AGE</div>
    </div>
    <div id="me"></div>
  </div>
</div>

<div class="P RT">
  <div class="P-hd">system</div>
  <div class="P-body" id="rt"></div>
</div>

<div class="FT">
  <span class="cmd" onclick="act('cycle')">F1 RUN CYCLE</span>
  <span class="sep">|</span>
  <span class="cmd" onclick="act('compact')">F2 COMPACT</span>
  <span class="sep">|</span>
  <span style="color:var(--t3)">ICARUS AGENT MEMORY TERMINAL</span>
  <span style="margin-left:auto;color:var(--t3)" id="ft-time"></span>
</div>

</div>

<script>
var AC={},CP=['#ff8c00','#448aff','#00c853','#d500f9','#ff1744','#ffd600','#00e5ff','#ff6d00'];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(t){if(!t)return'--';try{var d=new Date(t.replace(' UTC',':00Z').replace(' ','T')),m=Math.floor((Date.now()-d)/6e4);return m<1?'now':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'d'}catch(e){return'--'}}
function ac(n){if(!AC[n])AC[n]=CP[Object.keys(AC).length%CP.length];return AC[n]}
function kb(b){return(b/1024).toFixed(1)+'K'}

function render(d){
  var s=d.stats;
  // header stats
  document.getElementById('h-agents').textContent=s.activeAgents+'/'+s.totalAgents;
  document.getElementById('h-cycles').textContent=s.totalCycles;
  document.getElementById('h-entries').textContent=s.memoryEntries;
  document.getElementById('h-brain').textContent=kb(s.brainSize);
  document.getElementById('h-hot').textContent=s.hot;
  document.getElementById('h-warm').textContent=s.warm;
  document.getElementById('h-cold').textContent=s.cold;
  document.getElementById('h-last').textContent=d.lastCycleTs?ago(d.lastCycleTs):'--';
  document.getElementById('ag-count').textContent=s.totalAgents;
  document.getElementById('fd-count').textContent=d.feed.length;
  document.getElementById('me-count').textContent=d.fabricEntries.length;
  document.getElementById('tm-days').textContent=Object.keys(d.timeline).length+'d';

  // agents
  var h='';d.agents.forEach(function(a){var c=ac(a.name);
    h+='<div class="ag-row"><div class="ag-name" style="color:'+c+'">'+esc(a.name)+'</div><div class="ag-stat">'+(a.online?'<span class="up">ON</span>':'<span class="dn">OFF</span>')+'</div><div class="ag-role">'+esc(a.role)+'</div><div class="ag-plat">'+esc(a.lastPlatform||'--')+'</div><div class="ag-ts">'+ago(a.lastActive)+'</div></div>';
  });document.getElementById('al').innerHTML=h;

  // feed
  h='';d.feed.forEach(function(f){var c=ac(f.agent);
    h+='<div class="fd-row"><span class="fd-ts">'+ago(f.timestamp)+' </span><span class="fd-agent" style="color:'+c+'">'+esc(f.agent)+'</span> <span class="fd-cyc">#'+f.cycle+'</span><div class="fd-text">'+esc(f.thought||f.response)+'</div></div>';
  });
  // pad with all cycles from all agents if we have history
  d.agents.forEach(function(a){
    var c=ac(a.name);
    a.cycles.slice().reverse().slice(0,8).forEach(function(cy){
      h+='<div class="fd-row"><span class="fd-ts">'+ago(cy.timestamp)+' </span><span class="fd-agent" style="color:'+c+'">'+esc(a.name)+'</span> <span class="fd-cyc">#'+cy.cycle+'</span><div class="fd-text">'+esc(cy.thought||cy.response)+'</div></div>';
    });
  });
  document.getElementById('fd').innerHTML=h||'<div style="padding:6px;color:var(--t3)">NO DATA</div>';

  // memory entries
  h='';d.fabricEntries.slice(0,20).forEach(function(e){
    var tc=e.tier==='hot'?'hi':e.tier==='warm'?'yl':'bl';
    h+='<div class="me-row"><div class="me-tier '+tc+'">'+esc(e.tier).toUpperCase()+'</div><div class="me-type">'+esc(e.type||'--')+'</div><div class="me-agent" style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</div><div class="me-body">'+esc(e.summary||e.body||'--')+'</div><div class="me-ts">'+ago(e.timestamp)+'</div></div>';
  });document.getElementById('me').innerHTML=h;

  // right panel: tiers + platforms + compaction
  var t=Math.max(s.hot+s.warm+s.cold,1);
  h='<div class="rt-section"><div class="rt-section-hd">TIER BREAKDOWN</div>';
  h+='<div class="tier-row"><div class="tier-k hi">HOT</div><div class="tier-bar"><div class="tier-fill" style="width:'+(s.hot/t*100)+'%;background:var(--hi)"></div></div><div class="tier-n">'+s.hot+'</div></div>';
  h+='<div class="tier-row"><div class="tier-k yl">WRM</div><div class="tier-bar"><div class="tier-fill" style="width:'+(s.warm/t*100)+'%;background:var(--yl)"></div></div><div class="tier-n">'+s.warm+'</div></div>';
  h+='<div class="tier-row"><div class="tier-k bl">CLD</div><div class="tier-bar"><div class="tier-fill" style="width:'+(s.cold/t*100)+'%;background:var(--bl)"></div></div><div class="tier-n">'+s.cold+'</div></div>';
  h+='</div>';

  h+='<div class="rt-section"><div class="rt-section-hd">PLATFORMS</div>';
  var seen={};d.agents.forEach(function(a){a.platforms.forEach(function(p){
    var k=a.name+p.name;if(seen[k])return;seen[k]=1;var on=p.state==='connected';
    h+='<div class="plat-row"><div class="plat-dot" style="background:'+(on?'var(--up)':'var(--dn)')+'"></div><div class="plat-name" style="color:'+ac(a.name)+'">'+esc(a.name)+'</div><div class="plat-badge">'+esc(p.name)+'</div><div class="plat-state '+(on?'up':'dn')+'">'+p.state.toUpperCase()+'</div></div>';
  })});
  if(!Object.keys(seen).length) h+='<div style="color:var(--t3);padding:2px 0">NONE</div>';
  h+='</div>';

  h+='<div class="rt-section"><div class="rt-section-hd">COMPACTION</div>';
  if(d.compaction.length){d.compaction.forEach(function(c){
    h+='<div class="cmp-row"><span class="cmp-ts">'+esc(c.timestamp)+'</span> '+c.details.map(esc).join(' ')+'</div>';
  })}else{h+='<div style="color:var(--t3);padding:2px 0">NONE</div>'}
  h+='</div>';
  document.getElementById('rt').innerHTML=h;

  // chart
  var cv=document.getElementById('cv'),cx=cv.getContext('2d');
  var W=cv.parentElement.clientWidth,H=cv.parentElement.clientHeight-2;
  cv.width=W;cv.height=H;cx.clearRect(0,0,W,H);
  var days=Object.keys(d.timeline).sort();
  if(days.length<2){cx.fillStyle='#383838';cx.font='10px monospace';cx.fillText('COLLECTING DATA',W/2-50,H/2);return}
  var agents=[...new Set(d.fabricEntries.map(function(e){return e.agent}))],mx=1;
  days.forEach(function(dy){agents.forEach(function(a){mx=Math.max(mx,(d.timeline[dy]||{})[a]||0)})});
  // grid
  cx.strokeStyle='#1a1a1a';cx.lineWidth=0.5;
  for(var i=0;i<=4;i++){var y=4+(H-20)/4*i;cx.beginPath();cx.moveTo(30,y);cx.lineTo(W-4,y);cx.stroke()}
  // y labels
  cx.fillStyle='#383838';cx.font='9px monospace';
  for(var i=0;i<=4;i++){var v=Math.round(mx-mx/4*i);cx.fillText(v,2,8+(H-20)/4*i)}
  // lines
  agents.forEach(function(ag){
    cx.strokeStyle=ac(ag);cx.lineWidth=1;cx.beginPath();
    days.forEach(function(dy,di){
      var px=30+(di/(days.length-1))*(W-34),v=(d.timeline[dy]||{})[ag]||0,py=4+(H-20)-(v/mx)*(H-20);
      di===0?cx.moveTo(px,py):cx.lineTo(px,py);
    });cx.stroke();
  });
  // x labels
  cx.fillStyle='#383838';cx.font='9px monospace';
  cx.fillText(days[0],30,H-2);
  if(days.length>1)cx.fillText(days[days.length-1],W-70,H-2);

  // footer clock
  document.getElementById('ft-time').textContent=new Date().toISOString().slice(0,19).replace('T',' ')+' UTC';
}

function act(n){fetch('/api/action/'+n,{method:'POST'}).then(function(r){return r.json()}).then(function(r){console.log(r)})}
fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse=new EventSource('/api/stream');
sse.onmessage=function(e){render(JSON.parse(e.data))};
sse.onerror=function(){document.getElementById('h-live').className='dn';document.getElementById('h-live').textContent='DISCONNECTED'};
sse.onopen=function(){document.getElementById('h-live').className='live';document.getElementById('h-live').textContent='LIVE'};
setInterval(function(){document.getElementById('ft-time').textContent=new Date().toISOString().slice(0,19).replace('T',' ')+' UTC'},1000);
</script>
</body>
</html>
