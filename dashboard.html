<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920">
<title>icarus</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#111111;--border:#1e1e1e;--text:#e8e8e8;--dim:#6b7280;--dimmer:#3f3f46;
  --orange:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --mono:'Share Tech Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --tg:#229ED9;--sl:#611f69;--dc:#5865F2;--wa:#25D366;--sg:#3A76F0;--em:#6b7280;--cli:#404040;
}
html{font-size:13px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);width:1920px;height:1080px;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.top{height:52px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--mono);font-size:18px;color:var(--orange);font-weight:400;letter-spacing:1px}
.top-right{margin-left:auto;display:flex;gap:24px;font-family:var(--mono);font-size:11px;color:var(--dim)}
.top-right span{display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:3px;display:inline-block}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-orange{background:var(--orange)}

/* ── STATS ROW ── */
.stats{height:76px;display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:12px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
.stat:last-child{border-right:none}
.stat-val{font-family:var(--mono);font-size:26px;font-weight:400;color:var(--text);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:8px}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.mini-bar{display:flex;height:3px;border-radius:1px;overflow:hidden;width:60px}
.mini-bar span{height:100%}

/* ── MAIN GRID ── */
.grid{flex:1;display:grid;grid-template-columns:40% 35% 25%;overflow:hidden}
.col{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.col:last-child{border-right:none}
.col-header{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}

/* ── AGENT ROWS ── */
.agent-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.agent-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-name{font-family:var(--mono);font-size:12px;font-weight:400;color:var(--text)}
.agent-role{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-meta{font-family:var(--mono);font-size:10px;color:var(--dimmer);text-align:right;flex-shrink:0}
.badge{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;font-weight:500;letter-spacing:0.3px}

/* ── FEED ── */
.feed-item{padding:10px 16px;border-bottom:1px solid var(--border)}
.feed-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.feed-agent{font-family:var(--mono);font-size:11px;font-weight:500}
.feed-cycle{font-family:var(--mono);font-size:10px;color:var(--dimmer)}
.feed-ts{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-left:auto}
.feed-body{font-size:12px;color:#a0a0a8;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── MEMORY ENTRIES ── */
.mem-card{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.mem-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;width:160px}
.mem-body{flex:1;font-size:11px;color:var(--dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-width:0}
.mem-ts{font-family:var(--mono);font-size:10px;color:var(--dimmer);flex-shrink:0;width:50px;text-align:right}

/* ── TIER BARS ── */
.tier-row{display:flex;align-items:center;gap:8px;padding:6px 16px}
.tier-label{font-family:var(--mono);font-size:10px;width:40px;color:var(--dim)}
.tier-bar{flex:1;height:6px;background:var(--border);border-radius:2px;overflow:hidden}
.tier-fill{height:100%;border-radius:2px}
.tier-count{font-family:var(--mono);font-size:10px;width:30px;text-align:right;color:var(--dim);font-variant-numeric:tabular-nums}

/* ── CHART ── */
.chart-wrap{padding:12px 16px;height:120px;flex-shrink:0}
canvas{width:100%;height:100%}

/* ── HEALTH ── */
.health-row{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid var(--border)}
.health-plat{font-family:var(--mono);font-size:11px;flex:1}
.health-state{font-family:var(--mono);font-size:10px}

/* ── COMPACTION ── */
.compact-item{padding:6px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--dim)}
.compact-ts{color:var(--dimmer)}

/* ── ACTIONS ── */
.actions{display:flex;gap:6px;padding:10px 16px;flex-shrink:0;border-top:1px solid var(--border);margin-top:auto}
.btn{font-family:var(--mono);font-size:10px;padding:6px 12px;background:var(--card);border:1px solid var(--border);color:var(--dim);border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.btn:hover{color:var(--text);border-color:var(--dimmer)}

.empty{font-family:var(--mono);font-size:10px;color:var(--dimmer);padding:16px;text-align:center}

/* platform badge colors */
.b-telegram{background:rgba(34,158,217,0.15);color:var(--tg)}
.b-discord{background:rgba(88,101,242,0.15);color:var(--dc)}
.b-slack,.b-slack-webhook{background:rgba(97,31,105,0.15);color:var(--sl)}
.b-whatsapp{background:rgba(37,211,102,0.15);color:var(--wa)}
.b-signal{background:rgba(58,118,240,0.15);color:var(--sg)}
.b-email{background:rgba(107,114,128,0.15);color:var(--em)}
.b-cli{background:rgba(64,64,64,0.2);color:#888}
.b-dialogue{background:rgba(249,115,22,0.12);color:var(--orange)}
.b-code-session{background:rgba(59,130,246,0.12);color:var(--blue)}
.b-session{background:rgba(107,114,128,0.12);color:var(--dim)}
.b-resolution,.b-research,.b-task,.b-compacted{background:rgba(107,114,128,0.12);color:var(--dim)}
.b-hot{background:rgba(249,115,22,0.15);color:var(--orange)}
.b-warm{background:rgba(234,179,8,0.15);color:var(--yellow)}
.b-cold{background:rgba(59,130,246,0.12);color:var(--blue)}
</style>
</head>
<body>

<div class="top">
  <span class="logo">icarus</span>
  <div class="top-right">
    <span><span class="dot dot-green" id="live-dot"></span><span id="live-label">connected</span></span>
    <span id="last-cycle">--</span>
  </div>
</div>

<div class="stats" id="stats-row"></div>

<div class="grid">
  <!-- LEFT: Agents + Feed -->
  <div class="col">
    <div class="col-header">agents</div>
    <div id="agent-list"></div>
    <div class="col-header">activity feed</div>
    <div id="feed"></div>
  </div>

  <!-- CENTER: Memory -->
  <div class="col">
    <div class="col-header">memory timeline</div>
    <div class="chart-wrap"><canvas id="timeline-chart"></canvas></div>
    <div class="col-header">recent entries</div>
    <div id="mem-entries"></div>
    <div class="col-header">tier breakdown</div>
    <div id="tier-bars"></div>
  </div>

  <!-- RIGHT: Health -->
  <div class="col">
    <div class="col-header">platform status</div>
    <div id="health"></div>
    <div class="col-header">compaction history</div>
    <div id="compaction"></div>
    <div class="actions">
      <button class="btn" onclick="action('cycle')">run cycle</button>
      <button class="btn" onclick="action('compact')">compact</button>
    </div>
  </div>
</div>

<script>
var D = null;
var agentColors = {};
var colorPool = ['#f97316','#3b82f6','#22c55e','#a855f7','#ec4899','#eab308','#14b8a6','#f43f5e'];

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function ago(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts.replace(' UTC',':00Z').replace(' ','T'));
    var m = Math.floor((Date.now() - d.getTime()) / 60000);
    if (m < 1) return 'now';
    if (m < 60) return m + 'm';
    if (m < 1440) return Math.floor(m/60) + 'h';
    return Math.floor(m/1440) + 'd';
  } catch(e) { return ''; }
}
function agentColor(name) {
  if (!agentColors[name]) agentColors[name] = colorPool[Object.keys(agentColors).length % colorPool.length];
  return agentColors[name];
}
function badge(cls, text) { return '<span class="badge b-' + cls + '">' + esc(text) + '</span>'; }
function kb(bytes) { return (bytes / 1024).toFixed(1) + ' KB'; }

function renderStats(d) {
  var s = d.stats;
  var platBadges = s.allPlatforms.map(function(p) { return '<span class="badge b-' + p + '" style="font-size:8px">' + p[0].toUpperCase() + '</span>'; }).join('');
  document.getElementById('stats-row').innerHTML =
    '<div class="stat"><div class="stat-val">' + s.activeAgents + '<span class="dot ' + (s.activeAgents > 0 ? 'dot-green' : 'dot-red') + '"></span><span style="font-size:12px;color:var(--dim)">/ ' + s.totalAgents + '</span></div><div class="stat-label">agents</div></div>' +
    '<div class="stat"><div class="stat-val">' + s.totalCycles + '</div><div class="stat-label">cycles</div></div>' +
    '<div class="stat"><div class="stat-val">' + s.memoryEntries + ' <div class="mini-bar"><span style="flex:' + s.hot + ';background:var(--orange)"></span><span style="flex:' + Math.max(s.warm,0.1) + ';background:var(--yellow)"></span><span style="flex:' + Math.max(s.cold,0.1) + ';background:var(--blue)"></span></div></div><div class="stat-label">memory entries</div></div>' +
    '<div class="stat"><div class="stat-val">' + platBadges + '</div><div class="stat-label">platforms</div></div>' +
    '<div class="stat"><div class="stat-val">' + kb(s.brainSize) + '</div><div class="stat-label">brain size</div></div>' +
    '<div class="stat"><div class="stat-val">' + (s.totalCycles > 0 ? '3h' : '--') + '</div><div class="stat-label">cycle interval</div></div>';
  document.getElementById('last-cycle').textContent = 'last cycle: ' + (d.lastCycleTs ? ago(d.lastCycleTs) + ' ago' : '--');
}

function renderAgents(d) {
  var h = '';
  d.agents.forEach(function(a) {
    var c = agentColor(a.name);
    var platBadge = a.lastPlatform ? badge(a.lastPlatform, a.lastPlatform) : '';
    h += '<div class="agent-row">' +
      '<div class="agent-dot" style="background:' + (a.online ? 'var(--green)' : 'var(--dimmer)') + '"></div>' +
      '<div class="agent-info"><div class="agent-name" style="color:' + c + '">' + esc(a.name) + '</div><div class="agent-role">' + esc(a.role) + '</div></div>' +
      '<div class="agent-meta">' + platBadge + '<br>' + ago(a.lastActive) + '</div></div>';
  });
  document.getElementById('agent-list').innerHTML = h || '<div class="empty">no agents</div>';
}

function renderFeed(d) {
  var h = '';
  d.feed.forEach(function(f) {
    var c = agentColor(f.agent);
    h += '<div class="feed-item"><div class="feed-head"><span class="feed-agent" style="color:' + c + '">' + esc(f.agent) + '</span><span class="feed-cycle">cycle ' + f.cycle + '</span><span class="feed-ts">' + ago(f.timestamp) + '</span></div><div class="feed-body">' + esc(f.thought || f.response) + '</div></div>';
  });
  document.getElementById('feed').innerHTML = h || '<div class="empty">no activity</div>';
}

function renderMemEntries(d) {
  var h = '';
  d.fabricEntries.slice(0, 12).forEach(function(e) {
    h += '<div class="mem-card">' +
      '<div class="mem-badges">' +
        '<span class="badge b-' + e.tier + '" style="font-size:8px">' + e.tier + '</span>' +
        badge(e.type, e.type) +
        badge(e.platform, e.platform) +
      '</div>' +
      '<div class="mem-body"><span style="color:' + agentColor(e.agent) + '">' + esc(e.agent) + '</span> ' + esc(e.summary || e.body) + '</div>' +
      '<div class="mem-ts">' + ago(e.timestamp) + '</div></div>';
  });
  document.getElementById('mem-entries').innerHTML = h || '<div class="empty">no entries</div>';
}

function renderTiers(d) {
  var s = d.stats;
  var total = Math.max(s.hot + s.warm + s.cold, 1);
  document.getElementById('tier-bars').innerHTML =
    '<div class="tier-row"><span class="tier-label" style="color:var(--orange)">hot</span><div class="tier-bar"><div class="tier-fill" style="width:' + (s.hot/total*100) + '%;background:var(--orange)"></div></div><span class="tier-count">' + s.hot + '</span></div>' +
    '<div class="tier-row"><span class="tier-label" style="color:var(--yellow)">warm</span><div class="tier-bar"><div class="tier-fill" style="width:' + (s.warm/total*100) + '%;background:var(--yellow)"></div></div><span class="tier-count">' + s.warm + '</span></div>' +
    '<div class="tier-row"><span class="tier-label" style="color:var(--blue)">cold</span><div class="tier-bar"><div class="tier-fill" style="width:' + (s.cold/total*100) + '%;background:var(--blue)"></div></div><span class="tier-count">' + s.cold + '</span></div>';
}

function renderHealth(d) {
  var seen = {};
  var h = '';
  d.agents.forEach(function(a) {
    a.platforms.forEach(function(p) {
      var key = a.name + '-' + p.name;
      if (seen[key]) return;
      seen[key] = true;
      var isOn = p.state === 'connected';
      h += '<div class="health-row"><span class="dot ' + (isOn ? 'dot-green' : 'dot-red') + '"></span><span class="health-plat" style="color:' + agentColor(a.name) + '">' + esc(a.name) + '</span>' + badge(p.name, p.name) + '<span class="health-state" style="color:' + (isOn ? 'var(--green)' : 'var(--dimmer)') + '">' + p.state + '</span></div>';
    });
  });
  document.getElementById('health').innerHTML = h || '<div class="empty">no platforms</div>';
}

function renderCompaction(d) {
  var h = '';
  d.compaction.forEach(function(c) {
    h += '<div class="compact-item"><span class="compact-ts">' + esc(c.timestamp) + '</span><br>' + c.details.map(esc).join(' ') + '</div>';
  });
  document.getElementById('compaction').innerHTML = h || '<div class="empty">no compaction events</div>';
}

function renderTimeline(d) {
  var canvas = document.getElementById('timeline-chart');
  var ctx = canvas.getContext('2d');
  var W = canvas.parentElement.clientWidth;
  var H = 96;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  var days = Object.keys(d.timeline).sort();
  if (days.length < 2) {
    ctx.fillStyle = '#3f3f46'; ctx.font = '11px "Share Tech Mono"';
    ctx.fillText('not enough data for timeline', W/2 - 80, H/2);
    return;
  }

  var agents = [...new Set(d.fabricEntries.map(function(e){return e.agent}))];
  var maxVal = 1;
  days.forEach(function(day) { agents.forEach(function(a) { maxVal = Math.max(maxVal, d.timeline[day][a] || 0); }); });

  var padL = 30, padR = 10, padT = 10, padB = 20;
  var gW = W - padL - padR;
  var gH = H - padT - padB;

  // grid
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 0.5;
  for (var i = 0; i <= 4; i++) {
    var y = padT + (gH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
  }

  // lines per agent
  agents.forEach(function(agent, ai) {
    ctx.strokeStyle = agentColor(agent); ctx.lineWidth = 1.5;
    ctx.beginPath();
    days.forEach(function(day, di) {
      var x = padL + (di / (days.length - 1)) * gW;
      var val = (d.timeline[day] && d.timeline[day][agent]) || 0;
      var y = padT + gH - (val / maxVal) * gH;
      if (di === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // x labels
  ctx.fillStyle = '#3f3f46'; ctx.font = '9px "Share Tech Mono"';
  [days[0], days[days.length-1]].forEach(function(day, i) {
    var x = i === 0 ? padL : W - padR - 40;
    ctx.fillText(day.slice(5), x, H - 4);
  });
}

function render(data) {
  D = data;
  renderStats(data);
  renderAgents(data);
  renderFeed(data);
  renderMemEntries(data);
  renderTiers(data);
  renderHealth(data);
  renderCompaction(data);
  renderTimeline(data);
}

function action(name) {
  fetch('/api/action/' + name, { method: 'POST' }).then(function(r) { return r.json(); }).then(function(d) {
    console.log(d);
  });
}

fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse = new EventSource('/api/stream');
sse.onmessage = function(e) { render(JSON.parse(e.data)); };
sse.onerror = function() { document.getElementById('live-dot').className = 'dot dot-red'; document.getElementById('live-label').textContent = 'reconnecting'; };
sse.onopen = function() { document.getElementById('live-dot').className = 'dot dot-green'; document.getElementById('live-label').textContent = 'connected'; };
</script>
</body>
</html>
