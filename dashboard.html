<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ICARUS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0e0e10}
body{font-family:'JetBrains Mono',monospace;color:#d1d1d6;font-variant-numeric:tabular-nums}

/* FONT SYSTEM — three sizes, no exceptions */
:root{--fd:11px;--fl:10px;--fh:12px;--bg:#0e0e10;--p:#151518;--ph:#1c1c21;--bd:#252530;--am:#ff9933;--bl:#4a90d9;--gn:#26a65b;--rd:#e84855;--yl:#eab308;--lb:#5a5a6a;--tx:#d1d1d6;--dm:#3a3a44}

.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER: 30px */
.h1{height:30px;background:var(--p);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0;font-size:var(--fl)}
.h1 .logo{color:var(--am);font-weight:700;letter-spacing:1px}
.h1 .k{color:var(--lb)}.h1 .v{color:var(--am)}.h1 .s{color:var(--bd)}
.h1 .r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* TICKER: 18px */
.h2{height:18px;background:#111114;border-bottom:1px solid var(--bd);padding:0 8px;font-size:9px;color:var(--lb);display:flex;align-items:center;overflow:hidden;white-space:nowrap;flex-shrink:0;gap:8px}
.h2 b{color:var(--am);font-weight:400}

/* NAV: 24px */
.nv{height:24px;background:var(--p);border-bottom:1px solid var(--bd);display:flex;flex-shrink:0}
.nt{padding:0 12px;display:flex;align-items:center;font-size:var(--fl);color:var(--lb);cursor:pointer;border-bottom:2px solid transparent}
.nt:hover{color:var(--tx)}.nt.on{color:var(--am);border-bottom-color:var(--am)}

/* PAGES: remaining 1008px at 1080 viewport */
.pg{display:none;flex:1;overflow:hidden}.pg.on{display:flex;flex-direction:column}

/* FLEET GRID: 3 rows, exact percentages */
.fg{display:grid;grid-template-rows:46% 31% 23%;flex:1;overflow:hidden}

/* AGENT ROW: fills full width, agents share the space equally */
.ar{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));overflow-y:auto;background:var(--bd)}

/* AGENT CARD: dense, packed */
.ac{background:var(--p);border:1px solid var(--bd);padding:6px 8px;display:grid;grid-template-rows:auto auto auto auto auto;gap:2px;overflow:hidden}
.ac-r1{display:flex;align-items:center;gap:6px}
.ac-name{font-size:14px;font-weight:700;color:var(--am);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-badges{display:flex;gap:1px;flex-shrink:0}
.ac-badge{width:16px;height:16px;font-size:8px;line-height:16px;text-align:center;color:#fff;font-weight:700}
.ac-r2{display:flex;gap:12px;font-size:var(--fl);color:var(--lb)}
.ac-r2 span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-stats{display:grid;grid-template-columns:repeat(7,auto);gap:6px;font-size:var(--fl);align-items:baseline}
.ac-stats .n{color:var(--am);font-size:var(--fd)}.ac-stats .l{color:var(--lb)}
.ac-spark{height:30px}
.ac-mems{font-size:var(--fl);color:var(--dm)}
.ac-mem{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:14px;line-height:14px}
.ac-mem b{color:var(--lb);font-weight:400}

/* PANELS */
.P{background:var(--p);border:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.P-h{height:20px;background:var(--ph);border-bottom:1px solid var(--bd);padding:0 8px;display:flex;align-items:center;font-size:var(--fl);color:var(--lb);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.P-h span{margin-left:auto;color:var(--dm);font-size:9px;letter-spacing:0;text-transform:none}
.P-b{flex:1;overflow-y:auto;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bd)}::-webkit-scrollbar-thumb{background:var(--lb)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:2px 6px;color:var(--lb);font-weight:400;font-size:9px;letter-spacing:.5px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--ph);text-transform:uppercase;height:20px}
td{padding:2px 6px;height:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;font-size:var(--fd)}
tr:nth-child(odd) td{background:var(--p)}tr:nth-child(even) td{background:#1a1a1f}
tr:hover td{background:var(--ph)!important}

/* ATOMS */
.dot{display:inline-block;width:6px;height:6px;vertical-align:middle;margin-right:3px}
.dot-on{background:var(--gn);animation:pulse 2s ease infinite}.dot-off{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pill{display:inline-block;padding:0 4px;font-size:9px;font-weight:500;line-height:16px}
.pill-hot{background:var(--am);color:var(--bg)}.pill-warm{background:var(--yl);color:var(--bg)}.pill-cold{background:var(--bl);color:var(--bg)}
.feed{padding:1px 6px;font-size:var(--fd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:20px;line-height:20px}
.feed:nth-child(odd){background:var(--p)}.feed:nth-child(even){background:#1a1a1f}
.kv{display:flex;justify-content:space-between;padding:1px 6px;font-size:var(--fl)}.kv .k{color:var(--lb)}.kv .v{color:var(--tx)}
.bar-r{display:flex;align-items:center;gap:4px;padding:2px 6px;font-size:var(--fl)}
.bar-l{width:32px;font-weight:700;text-align:right}.bar-t{flex:1;height:8px;background:#1a1a1f}.bar-f{height:100%}.bar-i{width:56px;text-align:right;color:var(--lb);font-size:9px}
.btn{font-family:inherit;font-size:var(--fd);padding:4px 12px;background:transparent;border:1px solid var(--am);color:var(--am);cursor:pointer;text-transform:uppercase}
.btn:hover{background:var(--am);color:var(--bg)}
.search{font-family:inherit;font-size:var(--fd);background:var(--p);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;outline:none;caret-color:var(--am)}
.search:focus{border-color:var(--am)}
select{font-family:inherit;font-size:var(--fl);background:var(--p);border:1px solid var(--bd);color:var(--am);padding:2px 4px;outline:none}

/* MATRIX */
.mx{width:100%;border-collapse:collapse;font-size:var(--fl)}
.mx th,.mx td{padding:4px 8px;border:1px solid var(--bd);text-align:center;height:24px}
.mx th{background:var(--ph);color:var(--lb)}
.mx-hi{background:rgba(255,153,51,.12);color:var(--am)}
.mx-diag{background:rgba(74,144,217,.06);color:var(--bl)}
.mx-lo{color:var(--dm)}

/* ACT */
.aln{display:flex;height:22px;padding:0 6px;font-size:var(--fd);align-items:center;gap:4px}
.aln:nth-child(odd){background:var(--p)}.aln:nth-child(even){background:#1a1a1f}
.a-ts{width:56px;color:var(--lb);flex-shrink:0;font-size:var(--fl)}
.a-ty{width:52px;flex-shrink:0;font-size:9px;font-weight:500;text-transform:uppercase}
.a-ag{width:76px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis}
.a-pl{width:18px;flex-shrink:0}
.a-dt{flex:1;color:#8a8a94;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* PLAT CARDS */
.pc-row{display:flex;background:var(--bd)}
.pc{flex:1;background:var(--p);border:1px solid var(--bd);padding:6px 8px}

/* SYS */
.sg{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;flex:1;overflow:hidden}
</style>
</head>
<body>
<div class="shell">

<!-- 30px -->
<div class="h1">
  <span class="logo">▓▓ ICARUS</span>
  <span class="k">AGENTS</span><span class="v" id="sA"></span><span class="s">│</span>
  <span class="k">MEMORIES</span><span class="v" id="sE"></span><span class="s">│</span>
  <span class="k">BRAIN</span><span class="v" id="sB"></span><span class="s">│</span>
  <span class="k">HOT</span><span class="v" id="sH"></span><span class="k">WRM</span><span class="v" style="color:var(--yl)" id="sW"></span><span class="k">CLD</span><span class="v" style="color:var(--bl)" id="sC"></span><span class="s">│</span>
  <span class="k">UP</span><span class="v" id="sU"></span>
  <div class="r"><span style="color:var(--gn)" id="hL">● LIVE</span><span style="color:var(--lb)" id="hK"></span></div>
</div>

<!-- 18px -->
<div class="h2" id="tk"></div>

<!-- 24px -->
<div class="nv">
  <div class="nt on" data-p="fleet">FLEET</div>
  <div class="nt" data-p="memory">MEMORY</div>
  <div class="nt" data-p="platforms">PLATFORMS</div>
  <div class="nt" data-p="activity">ACTIVITY</div>
  <div class="nt" data-p="system">SYSTEM</div>
</div>

<!-- FLEET -->
<div class="pg on" id="pg-fleet">
  <div class="fg">
    <!-- row1: 46% agent cards -->
    <div class="ar" id="agR"></div>
    <!-- row2: 31% chart + feed -->
    <div style="display:flex">
      <div class="P" style="flex:6"><div class="P-h">activity timeline<span id="hTd"></span></div><div class="P-b" style="padding:2px 4px"><canvas id="cTl"></canvas></div></div>
      <div class="P" style="flex:4"><div class="P-h">live feed<span id="hFn"></span></div><div class="P-b" id="bFd"></div></div>
    </div>
    <!-- row3: 23% tiers + platforms + recalls -->
    <div style="display:flex">
      <div class="P" style="flex:1"><div class="P-h">tiers</div><div class="P-b" id="bTr"></div></div>
      <div class="P" style="flex:1"><div class="P-h">platforms</div><div class="P-b" id="bPl"></div></div>
      <div class="P" style="flex:1"><div class="P-h">cross-platform<span id="hXn"></span></div><div class="P-b" id="bXp"></div></div>
    </div>
  </div>
</div>

<!-- MEMORY -->
<div class="pg" id="pg-memory">
  <div style="height:32px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 6px;gap:4px;flex-shrink:0;background:var(--p)">
    <input class="search" style="flex:1" id="mQ" placeholder="search all memories...">
    <select id="mA"><option value="">all agents</option></select>
    <select id="mP"><option value="">all plats</option></select>
    <select id="mT"><option value="">all tiers</option><option>hot</option><option>warm</option><option>cold</option></select>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div style="flex:1;overflow-y:auto" id="mTb"></div>
    <div style="width:260px;border-left:1px solid var(--bd);overflow-y:auto;padding:2px" id="mSd"></div>
  </div>
</div>

<!-- PLATFORMS -->
<div class="pg" id="pg-platforms">
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="pc-row" id="pCd"></div>
    <div class="P" style="flex:1"><div class="P-h">cross-platform matrix</div><div class="P-b" style="padding:4px 6px" id="pMx"></div></div>
    <div class="P" style="height:150px;flex-shrink:0"><div class="P-h">volume by platform</div><div class="P-b" style="padding:2px 4px"><canvas id="cPv"></canvas></div></div>
  </div>
</div>

<!-- ACTIVITY -->
<div class="pg" id="pg-activity">
  <div style="height:26px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 6px;gap:6px;flex-shrink:0;background:var(--p)">
    <select id="xA"><option value="">all agents</option></select>
    <select id="xT"><option value="">all</option><option>write</option><option>recall</option></select>
  </div>
  <div style="flex:1;overflow-y:auto" id="xFd"></div>
</div>

<!-- SYSTEM -->
<div class="pg" id="pg-system"><div class="sg" id="syB"></div></div>

</div>

<script>
var D,CH={},cur='fleet';
var AC={},CP=['#ff9933','#4a90d9','#26a65b','#e84855','#9b59b6','#eab308','#2eaaaa','#cc5533'];
function $(i){return document.getElementById(i)}
function x(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(t){if(!t)return'--';try{var d=new Date(t.replace(' UTC',':00Z').replace(' ','T')),m=Math.floor((Date.now()-d)/6e4);return m<1?'<1m':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'d'}catch(e){return'--'}}
function ac(n){if(!AC[n])AC[n]=CP[Object.keys(AC).length%CP.length];return AC[n]}
function kb(b){return(b/1024).toFixed(1)+'KB'}
function pc(p){return{telegram:'#229ED9',discord:'#5865F2',slack:'#611f69',whatsapp:'#25D366',signal:'#3A76F0',email:'#6b7280',cli:'#808080'}[p]||'#5a5a6a'}
function bg(p){var n=p.name||p;return'<span class="ac-badge" style="background:'+pc(n)+'">'+(p.abbr||n[0].toUpperCase())+'</span>'}
function up(s){return Math.floor(s/3600)+'h'+Math.floor(s%3600/60)+'m'}
function pct(n,t){return t>0?Math.round(n/t*100)+'%':'0%'}

// NAV
document.querySelectorAll('.nt').forEach(function(el){el.onclick=function(){cur=el.dataset.p;location.hash=cur;
  document.querySelectorAll('.nt').forEach(function(t){t.classList.toggle('on',t.dataset.p===cur)});
  document.querySelectorAll('.pg').forEach(function(p){p.classList.toggle('on',p.id==='pg-'+cur)});if(D)rP()}});
if(location.hash.slice(1)){var ht=document.querySelector('.nt[data-p="'+location.hash.slice(1)+'"]');if(ht)ht.click()}

function render(d){D=d;var s=d.stats;
  $('sA').textContent=s.activeAgents+'/'+s.totalAgents;$('sE').textContent=s.totalEntries;
  $('sB').textContent=kb(s.brainSize);$('sH').textContent=s.hot;$('sW').textContent=s.warm;$('sC').textContent=s.cold;$('sU').textContent=up(s.uptime);
  var tk='';(d.ticker||[]).forEach(function(t){tk+='<b>'+ago(t.time)+'</b> '+x(t.text)+' │ '});
  (d.cronTail||[]).slice(-2).forEach(function(l){if(l.trim())tk+='<b>log</b> '+x(l.trim().slice(0,40))+' │ '});
  $('tk').innerHTML=tk||'waiting...';rP();
}
function rP(){if(cur==='fleet')rF();else if(cur==='memory')rM();else if(cur==='platforms')rPl();else if(cur==='activity')rA();else if(cur==='system')rS()}

// ════ FLEET ════
function rF(){var d=D,s=d.stats;
  // AGENT CARDS
  var h='';d.agents.forEach(function(a,i){var c=ac(a.name);var ent=a.entries||[];
    var plBadges='';a.platforms.forEach(function(p){plBadges+=bg(p)});
    // count entries by type
    var byType={};ent.forEach(function(e){byType[e.type]=(byType[e.type]||0)+1});
    var byPlat={};ent.forEach(function(e){byPlat[e.platform]=(byPlat[e.platform]||0)+1});
    // xplat count for this agent
    var xp=(d.xplatDetail||[]).filter(function(r){return r.agent===a.name});
    var uniqXp={};xp.forEach(function(r){uniqXp[r.from+r.to]=1});

    h+='<div class="ac">'
      // row1: dot + name + badges
      +'<div class="ac-r1"><span class="dot dot-'+(a.online?'on':'off')+'"></span>'
      +'<span class="ac-name" style="color:'+c+'">'+x(a.name)+'</span>'
      +'<div class="ac-badges">'+plBadges+'</div></div>'
      // row2: role + last active
      +'<div class="ac-r2"><span>'+x(a.role)+'</span><span>'+ago(a.lastActive)+(a.lastPlatform?' on '+a.lastPlatform:'')+'</span></div>'
      // row3: 7 stats
      +'<div class="ac-stats">'
      +'<span class="l">ENTRIES</span><span class="n">'+a.totalEntries+'</span>'
      +'<span class="l">CYCLES</span><span class="n">'+a.cycles.length+'</span>'
      +'<span class="l">PLATS</span><span class="n">'+a.platforms.length+'</span>'
      +'<span class="l">RECALLS</span><span class="n">'+Object.keys(uniqXp).length+'</span>'
      +'<span class="l">TYPES</span><span class="n">'+Object.keys(byType).length+'</span>'
      +'<span class="l">AVG</span><span class="n">'+(a.cycles.length>0?Math.round(a.cycles.reduce(function(s,c){return s+(c.thought||'').length},0)/a.cycles.length):0)+'ch</span>'
      +'<span class="l">'+(a.online?'<span style="color:var(--gn)">ONLINE</span>':'<span style="color:var(--rd)">OFFLINE</span>')+'</span>'
      +'</div>'
      // row4: sparkline
      +'<div class="ac-spark"><canvas id="sp'+i+'"></canvas></div>'
      // row5: last 3 memories
      +'<div class="ac-mems">';
    ent.slice(0,3).forEach(function(m){h+='<div class="ac-mem"><b>'+ago(m.timestamp)+'</b> '+x((m.summary||m.body||'').slice(0,70))+'</div>'});
    if(!ent.length)h+='<div class="ac-mem">—</div>';
    h+='</div></div>';
  });$('agR').innerHTML=h;

  // sparklines
  d.agents.forEach(function(a,i){
    var cv=document.getElementById('sp'+i);if(!cv)return;
    var days=[];for(var j=6;j>=0;j--)days.push(new Date(Date.now()-j*864e5).toISOString().slice(0,10));
    var vals=days.map(function(dy){return(a.entries||[]).filter(function(e){return e.timestamp&&e.timestamp.startsWith(dy)}).length});
    new Chart(cv,{type:'line',data:{labels:days,datasets:[{data:vals,borderColor:ac(a.name),backgroundColor:ac(a.name)+'22',borderWidth:1.5,pointRadius:0,fill:true,tension:.4}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:0},plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,beginAtZero:true}}}});
  });

  // TIMELINE
  var days=Object.keys(d.timeline).sort().filter(function(dy){return d.agents.some(function(a){return(d.timeline[dy][a.name]||0)>0})});
  if(days.length<2)days=Object.keys(d.timeline).sort().slice(-3);
  $('hTd').textContent=days.length+'d';
  var names=d.agents.map(function(a){return a.name});
  var ds=names.map(function(n){return{label:n,data:days.map(function(dy){return d.timeline[dy][n]||0}),borderColor:ac(n),backgroundColor:ac(n)+'22',borderWidth:1.5,pointRadius:2,pointBackgroundColor:ac(n),fill:true,tension:.3}});
  var cfg={type:'line',data:{labels:days.map(function(d){return d.slice(5)}),datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:{top:2,right:4,bottom:0,left:0}},
    plugins:{legend:{display:true,position:'top',labels:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:9},boxWidth:8,padding:4}}},
    scales:{x:{grid:{color:'#252530',drawBorder:false},ticks:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:9},maxRotation:0}},
            y:{grid:{color:'#252530',drawBorder:false},ticks:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:9},stepSize:1},beginAtZero:true}}}};
  if(CH.tl){CH.tl.data=cfg.data;CH.tl.update()}else CH.tl=new Chart($('cTl'),cfg);

  // FEED
  $('hFn').textContent=d.entries.length;
  h='';d.entries.slice(0,30).forEach(function(e){
    h+='<div class="feed"><span style="color:var(--dm);font-size:9px">'+(e.timestamp?e.timestamp.slice(11,16):'--')+'</span> '
      +'<span style="color:'+ac(e.agent)+'">'+x(e.agent)+'</span> '
      +'<span class="ac-badge" style="background:'+pc(e.platform)+';width:12px;height:12px;font-size:7px;line-height:12px">'+(e.platform||'?')[0].toUpperCase()+'</span> '
      +'<span style="color:#8a8a94">'+x((e.summary||e.body||'').slice(0,55))+'</span></div>';
  });$('bFd').innerHTML=h||'<div class="feed" style="color:var(--dm)">no entries</div>';

  // TIERS
  var total=Math.max(s.hot+s.warm+s.cold,1);
  h='';[['HOT',s.hot,'var(--am)'],['WRM',s.warm,'var(--yl)'],['CLD',s.cold,'var(--bl)']].forEach(function(r){
    h+='<div class="bar-r"><span class="bar-l" style="color:'+r[2]+'">'+r[0]+'</span><div class="bar-t"><div class="bar-f" style="width:'+pct(r[1],total)+';background:'+r[2]+'"></div></div><span class="bar-i">'+r[1]+' ('+pct(r[1],total)+')</span></div>';
  });
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;padding:2px">';
  [['total',''+s.totalEntries],['today',''+s.entriesToday],['brain',kb(s.brainSize)],['avg',s.totalEntries?Math.round(s.brainSize/s.totalEntries)+'B':'--'],['agents',''+s.totalAgents],['plats',''+s.platforms.length]].forEach(function(r){h+='<div class="kv"><span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>'});
  h+='</div>';
  h+='<div style="padding:4px 6px;display:flex;gap:3px;flex-wrap:wrap;border-top:1px solid var(--bd)">'
    +'<button class="btn" onclick="act(\'cycle\',this)">[F1 RUN]</button>'
    +'<button class="btn" onclick="act(\'compact\',this)">[F2 COMPACT]</button>'
    +'<button class="btn" onclick="addA()">[F3 ADD]</button>'
    +'<button class="btn" onclick="act(\'sync\',this)">[F4 SYNC]</button></div>';
  $('bTr').innerHTML=h;

  // PLATFORMS
  h='';var seen={};d.agents.forEach(function(a){a.platforms.forEach(function(p){
    if(seen[p.name])return;seen[p.name]=true;var on=p.state==='connected';
    var mc=d.entries.filter(function(e){return e.platform===p.name}).length;
    var ac2=d.agents.filter(function(a2){return a2.platforms.some(function(p2){return p2.name===p.name})}).length;
    h+='<div style="display:flex;align-items:center;gap:4px;padding:2px 6px;height:22px;font-size:var(--fd)">'
      +'<span class="dot dot-'+(on?'on':'off')+'"></span>'
      +'<span class="ac-badge" style="background:'+pc(p.name)+';width:14px;height:14px;font-size:7px;line-height:14px">'+(p.abbr||p.name[0].toUpperCase())+'</span>'
      +'<span style="color:'+pc(p.name)+';width:64px">'+x(p.name)+'</span>'
      +'<span style="color:var(--lb)">'+ac2+'ag</span>'
      +'<span style="color:var(--tx);margin-left:auto">'+mc+'</span></div>';
  })});$('bPl').innerHTML=h||'<div class="feed" style="color:var(--dm)">none</div>';

  // CROSS-PLATFORM
  $('hXn').textContent=s.xRecalls+' recalls';
  h='<div style="padding:4px 6px;font-size:18px;font-weight:700;color:var(--am)">'+s.xRecalls+'</div>';
  var xseen={};(d.xplatDetail||[]).slice(0,8).forEach(function(r){
    var k=r.agent+r.from+r.to;if(xseen[k])return;xseen[k]=1;
    h+='<div class="feed"><span style="color:var(--gn)">'+x(r.from.slice(0,3).toUpperCase())+':'+x(r.agent)+'</span>'
      +' <span style="color:var(--dm)">↔</span> '
      +'<span style="color:var(--bl)">'+x(r.to.slice(0,3).toUpperCase())+':'+x(r.agent)+'</span>'
      +' <span style="color:var(--dm)">'+ago(r.fromTs)+'</span></div>';
  });
  if(!d.xplatDetail||!d.xplatDetail.length)h+='<div class="feed" style="color:var(--dm)">no cross-platform recalls yet</div>';
  $('bXp').innerHTML=h;
}

// ════ MEMORY ════
function rM(){var d=D;
  var ags=[...new Set(d.entries.map(function(e){return e.agent}))],pls=[...new Set(d.entries.map(function(e){return e.platform}).filter(Boolean))];
  $('mA').innerHTML='<option value="">all</option>'+ags.map(function(a){return'<option>'+a+'</option>'}).join('');
  $('mP').innerHTML='<option value="">all</option>'+pls.map(function(p){return'<option>'+p+'</option>'}).join('');
  var q=($('mQ').value||'').toLowerCase(),fa=$('mA').value,fp=$('mP').value,ft=$('mT').value;
  var f=d.entries.filter(function(e){if(q&&!(e.body+e.summary+e.agent+e.platform).toLowerCase().includes(q))return false;
    if(fa&&e.agent!==fa)return false;if(fp&&e.platform!==fp)return false;if(ft&&e.tier!==ft)return false;return true});
  var h='<table><thead><tr><th>time</th><th>agent</th><th>plat</th><th>type</th><th>tier</th><th>content</th></tr></thead><tbody>';
  f.slice(0,80).forEach(function(e){h+='<tr><td style="color:var(--lb)">'+(e.timestamp?e.timestamp.slice(0,16):'--')+'</td><td style="color:'+ac(e.agent)+'">'+x(e.agent)+'</td><td><span class="ac-badge" style="background:'+pc(e.platform)+';width:14px;height:14px;font-size:7px;line-height:14px">'+(e.platform||'?')[0].toUpperCase()+'</span></td><td style="color:var(--lb)">'+x(e.type)+'</td><td><span class="pill pill-'+(e.tier||'hot')+'">'+x(e.tier||'hot')+'</span></td><td style="color:#8a8a94;max-width:400px">'+x((e.summary||e.body||'').slice(0,100))+'</td></tr>'});
  h+='</tbody></table>';$('mTb').innerHTML=h;
  var s=d.stats;h='<div class="kv"><span class="k">total</span><span class="v">'+s.totalEntries+'</span></div>';
  [['HOT',s.hot,'var(--am)'],['WARM',s.warm,'var(--yl)'],['COLD',s.cold,'var(--bl)']].forEach(function(r){h+='<div class="bar-r"><span class="bar-l" style="color:'+r[2]+';font-size:9px">'+r[0]+'</span><div class="bar-t"><div class="bar-f" style="width:'+pct(r[1],s.totalEntries)+';background:'+r[2]+'"></div></div><span style="font-size:9px;color:var(--lb);width:20px;text-align:right">'+r[1]+'</span></div>'});
  h+='<div style="border-top:1px solid var(--bd);margin-top:2px;padding-top:2px">';
  var agC={};d.entries.forEach(function(e){agC[e.agent]=(agC[e.agent]||0)+1});
  Object.entries(agC).forEach(function(r){h+='<div class="kv"><span class="k" style="color:'+ac(r[0])+'">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>'});
  h+='</div>';$('mSd').innerHTML=h;
}

// ════ PLATFORMS ════
function rPl(){var d=D;
  var plats={};d.agents.forEach(function(a){a.platforms.forEach(function(p){if(!plats[p.name])plats[p.name]={name:p.name,color:p.color||pc(p.name),abbr:p.abbr||p.name[0].toUpperCase(),agents:[],state:'offline',entries:0};plats[p.name].agents.push(a.name);if(p.state==='connected')plats[p.name].state='connected'})});
  d.entries.forEach(function(e){if(plats[e.platform])plats[e.platform].entries++});
  var h='';Object.values(plats).forEach(function(p){
    var td=d.entries.filter(function(e){return e.platform===p.name&&e.timestamp&&e.timestamp.startsWith(new Date().toISOString().slice(0,10))}).length;
    h+='<div class="pc"><div style="font-size:28px;font-weight:700;color:'+p.color+';line-height:1">'+p.abbr+'</div><div style="font-size:var(--fl);color:var(--lb)">'+x(p.name)+'</div>'
      +'<div style="color:'+(p.state==='connected'?'var(--gn)':'var(--rd)')+';font-size:var(--fl)">'+p.state.toUpperCase()+'</div>'
      +'<div class="kv"><span class="k">agents</span><span class="v">'+p.agents.join(', ')+'</span></div>'
      +'<div class="kv"><span class="k">total</span><span class="v">'+p.entries+'</span></div>'
      +'<div class="kv"><span class="k">today</span><span class="v">'+td+'</span></div></div>'});
  $('pCd').innerHTML=h||'<div style="padding:8px;color:var(--lb)">no platforms</div>';
  var pn=Object.keys(plats);
  if(pn.length>1){h='<table class="mx"><thead><tr><th>FROM╲TO</th>';pn.forEach(function(p){h+='<th style="color:'+pc(p)+'">'+p.slice(0,4).toUpperCase()+'</th>'});h+='</tr></thead><tbody>';
    pn.forEach(function(src){h+='<tr><th style="color:'+pc(src)+'">'+src.slice(0,4).toUpperCase()+'</th>';pn.forEach(function(dst){var k=src+'→'+dst,v=d.platMatrix[k]||0;h+='<td class="'+(src===dst?'mx-diag':(v>0?'mx-hi':'mx-lo'))+'">'+v+'</td>'});h+='</tr>'});
    h+='</tbody></table>'}else h='<div style="padding:8px;color:var(--lb)">need 2+ platforms</div>';
  $('pMx').innerHTML=h;
  var days=Object.keys(d.timeline).sort(),datasets=pn.map(function(p){return{label:p,data:days.map(function(dy){return d.entries.filter(function(e){return e.platform===p&&e.timestamp&&e.timestamp.startsWith(dy)}).length}),backgroundColor:pc(p),borderWidth:0}});
  var cfg={type:'bar',data:{labels:days.map(function(d){return d.slice(5)}),datasets:datasets},options:{responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:0},
    plugins:{legend:{display:true,position:'top',labels:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:9},boxWidth:8}}},
    scales:{x:{stacked:true,grid:{color:'#252530',drawBorder:false},ticks:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:8}}},y:{stacked:true,grid:{color:'#252530',drawBorder:false},ticks:{color:'#5a5a6a',font:{family:'JetBrains Mono',size:8}},beginAtZero:true}}}};
  if(CH.pv){CH.pv.data=cfg.data;CH.pv.update()}else CH.pv=new Chart($('cPv'),cfg);
}

// ════ ACTIVITY ════
function rA(){var d=D,fa=$('xA').value,ft=$('xT').value;
  var ags=[...new Set(d.entries.map(function(e){return e.agent}))];
  $('xA').innerHTML='<option value="">all</option>'+ags.map(function(a){return'<option>'+a+'</option>'}).join('');
  var h='';d.entries.slice(0,80).forEach(function(e){if(fa&&e.agent!==fa)return;
    var isX=(d.xplatDetail||[]).some(function(r){return r.agent===e.agent&&r.from===e.platform});
    var ty=isX?'RECALL':'WRITE';var tc=isX?'var(--gn)':'var(--am)';
    if(ft==='write'&&isX)return;if(ft==='recall'&&!isX)return;
    h+='<div class="aln"><span class="a-ts">'+(e.timestamp?e.timestamp.slice(11,19):'--')+'</span><span class="a-ty" style="color:'+tc+'">'+ty+'</span><span class="a-ag" style="color:'+ac(e.agent)+'">'+x(e.agent)+'</span><span class="a-pl"><span class="ac-badge" style="background:'+pc(e.platform)+';width:14px;height:14px;font-size:7px;line-height:14px">'+(e.platform||'?')[0].toUpperCase()+'</span></span><span class="a-dt">'+x((e.summary||e.body||'').slice(0,100))+'</span></div>'});
  $('xFd').innerHTML=h||'<div style="padding:8px;color:var(--lb)">no activity</div>';
}

// ════ SYSTEM ════
function rS(){fetch('/api/system').then(function(r){return r.json()}).then(function(sys){
  var h='<div class="P"><div class="P-h">config</div><div class="P-b"><table><thead><tr><th>agent</th><th>home</th><th>API</th><th>TGM</th><th>DSC</th><th>SLK</th></tr></thead><tbody>';
  sys.envStatus.forEach(function(a){h+='<tr><td style="color:var(--am)">'+x(a.name)+'</td><td style="color:var(--lb);max-width:180px">'+x(a.home)+'</td>';Object.values(a.vars).forEach(function(v){h+='<td style="color:'+(v==='SET'?'var(--gn)':'var(--rd)')+'">'+v+'</td>'});h+='</tr>'});
  h+='</tbody></table></div></div>';
  h+='<div class="P"><div class="P-h">health</div><div class="P-b">';
  [['node',sys.node],['platform',sys.platform],['fabric',kb(sys.fabricSize)]].forEach(function(r){h+='<div class="kv"><span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>'});
  h+='<div style="padding:4px 6px;display:flex;gap:3px;flex-wrap:wrap;border-top:1px solid var(--bd)"><button class="btn" onclick="act(\'cycle\',this)">[RUN]</button><button class="btn" onclick="act(\'compact\',this)">[COMPACT]</button><button class="btn" onclick="addA()">[ADD]</button><button class="btn" onclick="act(\'sync\',this)">[SYNC]</button></div></div></div>';
  h+='<div class="P" style="grid-column:span 2"><div class="P-h">log</div><div class="P-b" style="padding:2px 6px;font-size:var(--fl);color:var(--rd)">';
  sys.cronLog.forEach(function(l){h+='<div>'+x(l)+'</div>'});if(!sys.cronLog.length)h+='<div style="color:var(--gn)">no errors</div>';
  h+='</div></div>';$('syB').innerHTML=h})}

// filters
['mQ','mA','mP','mT'].forEach(function(id){var el=$(id);if(el){el.oninput=function(){if(D)rM()};el.onchange=function(){if(D)rM()}}});
['xA','xT'].forEach(function(id){$(id).onchange=function(){if(D)rA()}});

function act(n,b){if(b){var o=b.textContent;b.textContent='[...]';b.style.opacity='.4';setTimeout(function(){b.textContent=o;b.style.opacity=''},4000)}fetch('/api/'+n,{method:'POST'})}
function addA(){var n=prompt('Name:'),r=prompt('Role:');if(n&&r)fetch('/api/agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,role:r})}).then(function(){location.reload()})}
document.addEventListener('keydown',function(e){if(e.key==='F1'){e.preventDefault();act('cycle')}if(e.key==='F2'){e.preventDefault();act('compact')}if(e.key==='F3'){e.preventDefault();addA()}if(e.key==='F4'){e.preventDefault();act('sync')}});
setInterval(function(){$('hK').textContent=new Date().toISOString().slice(11,19)+' UTC';if(D)D.stats.uptime++},1000);

fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse=new EventSource('/api/events');
sse.onmessage=function(ev){render(JSON.parse(ev.data))};
sse.onerror=function(){$('hL').textContent='● OFFLINE';$('hL').style.color='var(--rd)'};
sse.onopen=function(){$('hL').textContent='● LIVE';$('hL').style.color='var(--gn)'};
</script>
</body>
