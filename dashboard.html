<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920">
<title>icarus.sys</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#101014;--p:#13131a;--b1:#1c1c26;--b2:#25252f;--t:#d1d1d8;--t2:#7a7a88;--t3:#44444f;--hi:#cf8a2e;--up:#2ea043;--dn:#c43b3b;--bl:#4080c0;--yl:#9e8a30;--cy:#2e8e9e}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--t2);width:1920px;height:1080px;overflow:hidden;font-size:11px;line-height:1}

.S{display:flex;flex-direction:column;height:100%}

/* ── FN TABS ── */
.fn{height:26px;background:#0c0c10;display:flex;align-items:stretch;border-bottom:1px solid var(--b1);flex-shrink:0}
.fn-tab{padding:0 14px;display:flex;align-items:center;font-size:10px;color:var(--t3);border-right:1px solid var(--b1);cursor:pointer;gap:4px;letter-spacing:0.3px}
.fn-tab b{color:var(--t2);font-weight:500}
.fn-tab:hover{background:var(--p)}
.fn-tab:active{background:var(--b1)}
.fn-r{margin-left:auto;display:flex;align-items:center;padding:0 12px;gap:12px;font-size:10px}
.fn-r .up{color:var(--up)}.fn-r .dn{color:var(--dn)}

/* ── CMD ── */
.cmd{height:28px;background:var(--p);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 10px;flex-shrink:0}
.cmd-label{color:var(--hi);font-size:11px;font-weight:500;margin-right:8px}
.cmd-in{flex:1;background:transparent;border:none;color:var(--t);font-family:inherit;font-size:11px;outline:none;caret-color:var(--hi)}
.cmd-in::placeholder{color:var(--t3)}

/* ── RIBBON ── */
.rib{height:20px;background:#0c0c10;border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 10px;font-size:10px;flex-shrink:0;gap:3px;overflow:hidden}
.rib .k{color:var(--t3);margin-left:6px}.rib .v{color:var(--t)}
.rib .s{color:var(--b2);margin:0 2px}

/* ── GRID ── */
.G{flex:1;display:grid;grid-template-columns:420px 1fr 400px;grid-template-rows:1fr 1fr;overflow:hidden}
.P{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.P-h{height:18px;background:#0e0e14;border-bottom:1px solid var(--b1);padding:0 8px;display:flex;align-items:center;font-size:9px;color:var(--t3);letter-spacing:0.8px;text-transform:uppercase;flex-shrink:0}
.P-h span{margin-left:auto;font-size:9px;color:var(--t3)}
.P-b{flex:1;overflow-y:auto}
.P-b::-webkit-scrollbar{width:0}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{font-weight:500;color:var(--t3);text-align:left;padding:2px 6px;border-bottom:1px solid var(--b1);font-size:9px;position:sticky;top:0;background:#0e0e14;letter-spacing:0.5px}
td{padding:1px 6px;border-bottom:1px solid #15151c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
tr:hover td{background:#15151e}

/* ── LED ── */
.led{display:inline-block;width:5px;height:5px}
.led-on{background:var(--up)}.led-off{background:var(--dn);opacity:0.4}

/* ── TICKER ── */
.tk{width:100%;border-collapse:collapse}
.tk td{padding:1px 6px;border-bottom:1px solid #15151c;font-size:10px}
.tk .ts{color:var(--t3);width:36px}
.tk .ev{width:36px;text-align:center}
.tk .ag{width:68px;overflow:hidden;text-overflow:ellipsis}
.tk .hl{color:var(--t2);max-width:0;overflow:hidden;text-overflow:ellipsis}
.tk tr:hover td{background:#15151e}
.tk tr:hover .hl{color:var(--t)}

/* ── SPARKLINE ── */
.spark{display:inline-block;width:28px;height:8px;background:var(--b1);vertical-align:middle;overflow:hidden}
.spark i{display:block;height:100%}

/* ── SYS SECTIONS ── */
.ss{padding:3px 8px;border-bottom:1px solid var(--b1)}
.ss-h{font-size:9px;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:2px}
.ss-row{display:flex;align-items:center;gap:4px;padding:1px 0;font-size:10px}
.ss-k{width:36px;text-align:right;color:var(--t3)}.ss-v{color:var(--t2)}
.bar{flex:1;height:3px;background:var(--b1)}.bar-f{height:100%}
.bar-n{width:20px;text-align:right;font-size:10px;font-variant-numeric:tabular-nums}

/* ── COLORS ── */
.c-hi{color:var(--hi)}.c-up{color:var(--up)}.c-dn{color:var(--dn)}.c-bl{color:var(--bl)}.c-yl{color:var(--yl)}.c-cy{color:var(--cy)}

/* ── FOOTER ── */
.ft{height:16px;background:#0c0c10;border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 10px;font-size:9px;color:var(--t3);flex-shrink:0;letter-spacing:0.3px}
.ft span{margin-left:auto}

canvas{width:100%;height:100%}
</style>
</head>
<body>
<div class="S">

<div class="fn">
  <div class="fn-tab" onclick="act('cycle')"><b>F1</b> RUN</div>
  <div class="fn-tab" onclick="act('compact')"><b>F2</b> COMPACT</div>
  <div class="fn-tab"><b>F3</b> LOGS</div>
  <div class="fn-tab"><b>F4</b> FABRIC</div>
  <div class="fn-r">
    <span id="hLive" class="up">LIVE</span>
    <span id="hClock"></span>
  </div>
</div>

<div class="cmd">
  <span class="cmd-label">></span>
  <input class="cmd-in" id="cmdIn" placeholder="search or command" spellcheck="false" autofocus>
</div>

<div class="rib" id="rib"></div>

<div class="G">
  <div class="P"><div class="P-h">AGENTS <span id="nAg"></span></div><div class="P-b"><table><thead><tr><th></th><th>NAME</th><th>ST</th><th>ROLE</th><th>PLAT</th><th>LAST</th></tr></thead><tbody id="tAg"></tbody></table></div></div>
  <div class="P"><div class="P-h">TICKER <span id="nTk"></span></div><div class="P-b"><table class="tk"><thead><tr><th>TIME</th><th>TYPE</th><th>AGENT</th><th>HEADLINE</th></tr></thead><tbody id="tTk"></tbody></table></div></div>
  <div class="P"><div class="P-h">TIMELINE <span id="nTm"></span></div><div class="P-b"><canvas id="cv"></canvas></div></div>
  <div class="P"><div class="P-h">FABRIC <span id="nMe"></span></div><div class="P-b"><table><thead><tr><th>TIER</th><th>TYPE</th><th>AGENT</th><th>SUMMARY</th><th>AGE</th><th></th></tr></thead><tbody id="tMe"></tbody></table></div></div>
  <div class="P"><div class="P-h">EXPANDED</div><div class="P-b" id="exp"></div></div>
  <div class="P"><div class="P-h">SYSTEM</div><div class="P-b" id="sys"></div></div>
</div>

<div class="ft">ICARUS.SYS v0.1 <span id="ftTs"></span></div>

</div>
<script>
var AC={},CP=['#cf8a2e','#4080c0','#2ea043','#8060c0','#c43b3b','#9e8a30','#2e8e9e','#b05020'];
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function ago(t){if(!t)return'--';try{var d=new Date(t.replace(' UTC',':00Z').replace(' ','T')),m=Math.floor((Date.now()-d)/6e4);return m<1?'<1m':m<60?m+'m':m<1440?Math.floor(m/60)+'h':Math.floor(m/1440)+'d'}catch(e){return'--'}}
function ac(n){if(!AC[n])AC[n]=CP[Object.keys(AC).length%CP.length];return AC[n]}
function kb(b){return(b/1024).toFixed(1)}
function sparkAge(ts){if(!ts)return'';try{var h=Math.min(168,Math.floor((Date.now()-new Date(ts).getTime())/36e5));var pct=Math.min(100,h/168*100);var c=pct<15?'var(--up)':pct<50?'var(--yl)':'var(--dn)';return'<span class="spark"><i style="width:'+pct+'%;background:'+c+'"></i></span>'}catch(e){return''}}

function render(d){
  var s=d.stats;
  // ribbon
  document.getElementById('rib').innerHTML='<span class="k">AGENTS</span><span class="v">'+s.activeAgents+'/'+s.totalAgents+'</span><span class="s">|</span><span class="k">CYCLES</span><span class="v">'+s.totalCycles+'</span><span class="s">|</span><span class="k">ENTRIES</span><span class="v">'+s.memoryEntries+'</span><span class="s">|</span><span class="k">HOT</span><span class="v c-hi">'+s.hot+'</span><span class="k">WRM</span><span class="v c-yl">'+s.warm+'</span><span class="k">CLD</span><span class="v c-bl">'+s.cold+'</span><span class="s">|</span><span class="k">BRAIN</span><span class="v">'+kb(s.brainSize)+'K</span><span class="s">|</span><span class="k">LAST</span><span class="v">'+(d.lastCycleTs?ago(d.lastCycleTs):'--')+'</span>';
  document.getElementById('nAg').textContent=s.totalAgents;
  document.getElementById('nTk').textContent='';
  document.getElementById('nMe').textContent=d.fabricEntries.length;
  document.getElementById('nTm').textContent=Object.keys(d.timeline).length+'d';

  // agents
  var h='';d.agents.forEach(function(a){var c=ac(a.name);
    h+='<tr><td><span class="led '+(a.online?'led-on':'led-off')+'"></span></td><td style="color:'+c+'">'+esc(a.name)+'</td><td>'+(a.online?'<span class="c-up">RUN</span>':'<span class="c-dn">OFF</span>')+'</td><td style="color:var(--t3);max-width:140px">'+esc(a.role)+'</td><td>'+esc(a.lastPlatform||'--')+'</td><td>'+ago(a.lastActive)+'</td></tr>';
  });document.getElementById('tAg').innerHTML=h;

  // ticker: strict table, one line per event
  h='';
  function addTick(ts,type,agent,text,tcls){
    h+='<tr><td class="ts">'+ago(ts)+'</td><td class="ev '+tcls+'">'+type+'</td><td class="ag" style="color:'+ac(agent)+'">'+esc(agent)+'</td><td class="hl">'+esc(text.slice(0,140))+'</td></tr>';
  }
  d.feed.forEach(function(f){addTick(f.timestamp,'INFO',f.agent,(f.thought||f.response||''),'c-cy')});
  d.agents.forEach(function(a){a.cycles.slice().reverse().slice(0,5).forEach(function(cy){addTick(cy.timestamp,'LOG',a.name,(cy.thought||cy.response||''),'')})});
  document.getElementById('tTk').innerHTML=h;

  // fabric entries with sparkline age
  h='';d.fabricEntries.slice(0,30).forEach(function(e){
    var tc=e.tier==='hot'?'c-hi':e.tier==='warm'?'c-yl':'c-bl';
    h+='<tr><td class="'+tc+'">'+esc(e.tier).toUpperCase()+'</td><td>'+esc(e.type||'--')+'</td><td style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</td><td style="color:var(--t2);max-width:260px">'+esc(e.summary||e.body||'--')+'</td><td>'+ago(e.timestamp)+'</td><td>'+sparkAge(e.timestamp)+'</td></tr>';
  });document.getElementById('tMe').innerHTML=h;

  // expanded: last 4 entries with body
  h='';d.fabricEntries.slice(0,4).forEach(function(e){
    h+='<div style="padding:3px 8px;border-bottom:1px solid var(--b1)"><div style="display:flex;gap:6px;font-size:10px"><span style="color:'+ac(e.agent)+'">'+esc(e.agent)+'</span><span>'+esc(e.platform)+'</span><span>'+esc(e.type)+'</span><span style="margin-left:auto">'+ago(e.timestamp)+'</span></div><div style="color:var(--t2);font-size:10px;line-height:1.35;margin-top:2px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">'+esc(e.body||e.summary||'--')+'</div></div>';
  });document.getElementById('exp').innerHTML=h||'<div style="padding:8px;color:var(--t3)">EMPTY</div>';

  // system
  var t=Math.max(s.hot+s.warm+s.cold,1);
  h='<div class="ss"><div class="ss-h">TIERS</div>';
  [['HOT',s.hot,'var(--hi)'],['WRM',s.warm,'var(--yl)'],['CLD',s.cold,'var(--bl)']].forEach(function(r){
    h+='<div class="ss-row"><span class="ss-k" style="color:'+r[2]+'">'+r[0]+'</span><div class="bar"><div class="bar-f" style="width:'+(r[1]/t*100)+'%;background:'+r[2]+'"></div></div><span class="bar-n" style="color:var(--t2)">'+r[1]+'</span></div>';
  });h+='</div>';

  h+='<div class="ss"><div class="ss-h">PLATFORMS</div>';
  var seen={};d.agents.forEach(function(a){a.platforms.forEach(function(p){
    var k=a.name+p.name;if(seen[k])return;seen[k]=1;var on=p.state==='connected';
    h+='<div class="ss-row"><span class="led '+(on?'led-on':'led-off')+'"></span><span style="width:56px;color:'+ac(a.name)+'">'+esc(a.name)+'</span><span style="width:52px">'+esc(p.name)+'</span><span style="flex:1;text-align:right;color:'+(on?'var(--up)':'var(--dn)')+'">'+p.state.toUpperCase()+'</span></div>';
  })});
  if(!Object.keys(seen).length)h+='<div class="ss-row" style="color:var(--t3)">NONE</div>';
  h+='</div>';

  h+='<div class="ss"><div class="ss-h">COMPACTION</div>';
  if(d.compaction.length){d.compaction.forEach(function(c){h+='<div style="font-size:9px;color:var(--t3);padding:1px 0">'+esc(c.timestamp)+' '+c.details.map(esc).join(' ')+'</div>'})}
  else h+='<div style="font-size:9px;color:var(--t3)">NO EVENTS</div>';
  h+='</div>';

  h+='<div class="ss"><div class="ss-h">BRAIN</div>';
  h+='<div class="ss-row"><span class="ss-k">SIZE</span><span class="ss-v">'+kb(s.brainSize)+' KB</span></div>';
  h+='<div class="ss-row"><span class="ss-k">FILES</span><span class="ss-v">'+s.memoryEntries+'</span></div>';
  h+='<div class="ss-row"><span class="ss-k">PLATS</span><span class="ss-v">'+s.allPlatforms.length+'</span></div>';
  h+='</div>';
  document.getElementById('sys').innerHTML=h;

  // chart
  var cv=document.getElementById('cv'),cx=cv.getContext('2d');
  var W=cv.parentElement.clientWidth,H=cv.parentElement.clientHeight;
  cv.width=W;cv.height=H;cx.clearRect(0,0,W,H);
  var days=Object.keys(d.timeline).sort();
  if(days.length<2){cx.fillStyle='#44444f';cx.font='9px IBM Plex Mono';cx.fillText('COLLECTING...',W/2-36,H/2);return}
  var agents=[...new Set(d.fabricEntries.map(function(e){return e.agent}))],mx=1;
  days.forEach(function(dy){agents.forEach(function(a){mx=Math.max(mx,(d.timeline[dy]||{})[a]||0)})});
  var pL=28,pR=6,pT=6,pB=14,gW=W-pL-pR,gH=H-pT-pB;
  cx.strokeStyle='#1c1c26';cx.lineWidth=0.5;
  for(var i=0;i<=4;i++){var y=pT+gH/4*i;cx.beginPath();cx.moveTo(pL,y);cx.lineTo(W-pR,y);cx.stroke()}
  cx.fillStyle='#44444f';cx.font='8px IBM Plex Mono';
  for(var i=0;i<=4;i++){cx.fillText(Math.round(mx-mx/4*i),1,pT+3+gH/4*i)}
  agents.forEach(function(ag){
    cx.strokeStyle=ac(ag);cx.lineWidth=1;cx.beginPath();
    days.forEach(function(dy,di){
      var px=pL+(di/(days.length-1))*gW,v=(d.timeline[dy]||{})[ag]||0,py=pT+gH-(v/mx)*gH;
      di===0?cx.moveTo(px,py):cx.lineTo(px,py);
    });cx.stroke();
  });
  cx.fillStyle='#44444f';cx.font='8px IBM Plex Mono';
  cx.fillText(days[0],pL,H-2);
  if(days.length>1)cx.fillText(days[days.length-1],W-pR-60,H-2);
  var lx=pL;agents.forEach(function(ag){cx.fillStyle=ac(ag);cx.fillRect(lx,H-12,4,4);cx.fillStyle='#44444f';cx.fillText(ag,lx+7,H-7);lx+=cx.measureText(ag).width+16});
}

function act(n){fetch('/api/action/'+n,{method:'POST'}).then(function(r){return r.json()}).then(function(r){console.log(r)})}
document.getElementById('cmdIn').addEventListener('keydown',function(e){if(e.key==='Enter'){var v=this.value.trim().toLowerCase();if(v==='run'||v==='cycle')act('cycle');else if(v==='compact')act('compact');this.value=''}});
document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT')return;if(e.key==='F1'){e.preventDefault();act('cycle')}if(e.key==='F2'){e.preventDefault();act('compact')}});
function clk(){var n=new Date();document.getElementById('hClock').textContent=n.toISOString().slice(11,19);document.getElementById('ftTs').textContent=n.toISOString().slice(0,19).replace('T',' ')+' UTC'}
clk();setInterval(clk,1000);
fetch('/api/data').then(function(r){return r.json()}).then(render);
var sse=new EventSource('/api/stream');
sse.onmessage=function(e){render(JSON.parse(e.data))};
sse.onerror=function(){document.getElementById('hLive').className='dn';document.getElementById('hLive').textContent='DISCONNECTED'};
sse.onopen=function(){document.getElementById('hLive').className='up';document.getElementById('hLive').textContent='LIVE'};
</script>
</body>
</html>
